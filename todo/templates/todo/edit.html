{% load static %}
<!DOCTYPE html>
<html lang="ja">

<head>
  <title>To Do Application</title>
  <meta charset="UTF-8">
  <meta name="author" content="INIAD">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>
  <h1>Edit task</h1>
  <p>You can edit tasks from the following form.</p>
  <form action="{% url 'update' task.id%}" method="post">
    {% csrf_token %}
    <div>
      <label for="titleInput">Title</label><br>
      <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
    </div>
    <div>
      <label for="dueInput">Due at:</label><br>
      <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:" Y-m-d H:i" }}">
    </div>
    <div>
      <label for="projectInput">Project</label><br>
      <select id="projectInput" name="project">
        <option value="">-- No project --</option>
        {% for project in projects %}
        <option value="{{ project.id }}" {% if task.project and task.project.id == project.id %}selected{% endif %}>{{ project.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="projectNameInput">New Project Name</label><br>
      <input id="projectNameInput" name="project_name" type="text" placeholder="Create new project">
    </div>
    <div>
      <button type="submit">Submit</button>
    </div>
  </form>
  <br>
</body>

</html>
